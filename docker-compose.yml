version: "3.7"
services:
  app:
    build:
      args:
        user: sammy
        uid: 1000
      context: ./
      dockerfile: Dockerfile
    image: hrms
    # command: "php artisan serve --host=0.0.0.0 --port=8000"
    # ports:
    #   - "8001:8000"
    container_name: hrms-app
    restart: unless-stopped
    working_dir: /var/www/
    depends_on:
      - db
    volumes:
      - ./:/var/www
    networks:
      - hrms

  db:
    image: mysql:8.0
    container_name: hrms-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - hrms-db-data:/var/lib/mysql
    networks:
      - hrms

  queue:
    image: hrms
    container_name: hrms-queue
    restart: unless-stopped
    working_dir: /var/www/
    command: php artisan queue:work --queue=payroll,notifications,default --sleep=3 --tries=1 --timeout=1800
    depends_on:
      - db
    volumes:
      - ./:/var/www
    networks:
      - hrms

  nginx:
    image: nginx:alpine
    container_name: hrms-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d
      # - ./docker-compose/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - hrms

networks:
  hrms:
    driver: bridge

volumes:
  hrms-db-data:
